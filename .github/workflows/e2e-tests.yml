# ═══════════════════════════════════════════════════════════════════════════════
# .github/workflows/e2e-tests.yml
# Digipay — Selenium E2E Test Suite  |  GitHub Actions CI/CD Pipeline
#
# Triggers: Every push to any branch  +  Every Pull Request to main
# Produces: Downloadable .xlsx test report as a GitHub Actions artifact
# ═══════════════════════════════════════════════════════════════════════════════

name: 🧪 Digipay E2E Test Suite

on:
  push:
    branches: ["**"]          # Run on every branch push
  pull_request:
    branches: [main]          # Run on PRs targeting main
  workflow_dispatch:          # Allow manual trigger from GitHub UI
    inputs:
      target_url:
        description: "Override the app URL to test (leave blank for GitHub Pages default)"
        required: false
        default: ""

# Cancel in-progress runs for the same branch to save minutes
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB: Run Selenium E2E Tests + Generate XLSX Report
  # ─────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: "🔬 Run E2E Tests + Generate Report"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DIGIPAY_BASE_URL: ${{ github.event.inputs.target_url || 'https://harishbalaji826-ops.github.io/digipay-Web/' }}
      DIGIPAY_BACKEND_URL: ${{ secrets.DIGIPAY_BACKEND_URL || 'https://digipay-backend.up.railway.app' }}
      ADMIN_PHONE: "9999999999"
      SELENIUM_TIMEOUT: "20"

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      # ── 2. Set up Python (BEFORE Chrome so pip install always runs) ───────
      - name: "🐍 Set up Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements-test.txt"

      # ── 3. Install Python dependencies (BEFORE Chrome install) ────────────
      - name: "📦 Install Python dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
          # Verify key packages are installed
          python -c "import selenium; print('selenium', selenium.__version__)"
          python -c "import openpyxl; print('openpyxl', openpyxl.__version__)"
          python -c "import pytest; print('pytest', pytest.__version__)"

      # ── 4. Install Google Chrome (using pre-installed or apt directly) ────
      - name: "🌐 Set up Google Chrome"
        run: |
          # ubuntu-latest ships with Chrome — just verify / install if missing
          if ! command -v google-chrome &>/dev/null; then
            echo "Chrome not found, installing via apt..."
            sudo apt-get update -qq
            sudo apt-get install -y google-chrome-stable
          fi
          google-chrome --version
          # Also confirm ChromeDriver will be managed by webdriver-manager
          python -c "from webdriver_manager.chrome import ChromeDriverManager; print('webdriver-manager OK')"

      # ── 5. Create output directories ──────────────────────────────────────
      - name: "📁 Create output directories"
        run: mkdir -p .test-results reports

      # ── 6. Wait for GitHub Pages to be reachable ──────────────────────────
      - name: "⏳ Wait for GitHub Pages deployment"
        run: |
          echo "Checking if GitHub Pages is reachable at: $DIGIPAY_BASE_URL"
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DIGIPAY_BASE_URL" || echo "000")
            echo "Attempt $i — HTTP status: $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "✅ App is reachable!"
              break
            fi
            sleep 10
          done

      # ── 7. Run Selenium E2E test suite ────────────────────────────────────
      - name: "🧪 Run Selenium E2E Tests"
        continue-on-error: true    # Always generate report even on failures
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --json-report \
            --json-report-file=.test-results/report.json \
            --json-report-indent=2 \
            --timeout=60 \
            2>&1 | tee .test-results/pytest-output.txt
        env:
          DIGIPAY_BASE_URL: ${{ env.DIGIPAY_BASE_URL }}
          DIGIPAY_BACKEND_URL: ${{ env.DIGIPAY_BACKEND_URL }}
          ADMIN_PHONE: ${{ env.ADMIN_PHONE }}
          SELENIUM_TIMEOUT: ${{ env.SELENIUM_TIMEOUT }}

      # ── 8. Generate XLSX Report ───────────────────────────────────────────
      - name: "📊 Generate XLSX Test Report"
        if: always()
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%S")
          REPORT_NAME="E2E_Test_Report_Digipay_${TIMESTAMP}.xlsx"
          echo "REPORT_FILENAME=$REPORT_NAME" >> $GITHUB_ENV
          python tests/generate_report.py \
            --input  .test-results/report.json \
            --output "reports/$REPORT_NAME" \
            --run-id "${{ github.run_id }}" \
            --sha    "${{ github.sha }}" \
            --branch "${{ github.ref_name }}" \
            --app-url "${{ env.DIGIPAY_BASE_URL }}"
          echo "✅ Report generated: reports/$REPORT_NAME"
          ls -lh reports/

      # ── 9. Print test summary to job log ──────────────────────────────────
      - name: "📋 Print Test Summary"
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  DIGIPAY E2E TEST RESULTS SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Run ID   : ${{ github.run_id }}"
          echo "  Commit   : ${{ github.sha }}"
          echo "  Branch   : ${{ github.ref_name }}"
          echo "  App URL  : $DIGIPAY_BASE_URL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ -f ".test-results/report.json" ]; then
            python3 - <<'EOF'
          import json, sys
          with open(".test-results/report.json") as f:
              r = json.load(f)
          summary = r.get("summary", {})
          total   = summary.get("total",   0)
          passed  = summary.get("passed",  0)
          failed  = summary.get("failed",  0)
          skipped = summary.get("skipped", 0)
          errors  = summary.get("error",   0)
          dur     = round(r.get("duration", 0), 2)
          pct     = round(passed/total*100, 1) if total else 0
          print(f"  Total    : {total}")
          print(f"  Passed   : {passed}")
          print(f"  Failed   : {failed}")
          print(f"  Skipped  : {skipped}")
          print(f"  Errors   : {errors}")
          print(f"  Pass Rate: {pct}%")
          print(f"  Duration : {dur}s")
          print("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")
          if failed > 0:
              print("\n  FAILED TESTS:")
              for t in r.get("tests", []):
                  if t.get("outcome") == "failed":
                      print(f"    - {t['nodeid']}")
          EOF
          else
            echo "  No JSON report found — showing pytest tail output:"
            cat .test-results/pytest-output.txt 2>/dev/null | tail -40 || true
          fi

      # ── 10. Upload XLSX as downloadable artifact ──────────────────────────
      - name: "💾 Upload XLSX Report Artifact"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "E2E-Test-Report-${{ github.run_id }}"
          path: "reports/*.xlsx"
          retention-days: 30
          if-no-files-found: warn

      # ── 11. Upload raw pytest output (debug aid) ──────────────────────────
      - name: "📄 Upload Raw Pytest Output"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "pytest-raw-output-${{ github.run_id }}"
          path: ".test-results/"
          retention-days: 14
          if-no-files-found: warn

      # ── 12. Post summary to GitHub Job Summary ────────────────────────────
      - name: "📌 Post Summary to GitHub Job Summary"
        if: always()
        run: |
          echo "## Digipay E2E Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Run ID** | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **App URL** | ${{ env.DIGIPAY_BASE_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f ".test-results/report.json" ]; then
            python3 - <<'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          with open(".test-results/report.json") as f:
              r = json.load(f)
          s = r.get("summary", {})
          total   = s.get("total",   0)
          passed  = s.get("passed",  0)
          failed  = s.get("failed",  0)
          skipped = s.get("skipped", 0)
          pct     = round(passed/total*100, 1) if total else 0
          icon    = "PASS" if failed == 0 else "FAIL"
          print(f"### {icon}: {passed}/{total} Passed ({pct}%)")
          print("")
          print("| Status | Count |")
          print("|--------|-------|")
          print(f"| Passed | **{passed}** |")
          print(f"| Failed | **{failed}** |")
          print(f"| Skipped | {skipped} |")
          print(f"| Pass Rate | **{pct}%** |")
          print("")
          if failed > 0:
              print("### Failed Tests")
              print("")
              for t in r.get("tests", []):
                  if t.get("outcome") == "failed":
                      print(f"- `{t['nodeid']}`")
          print("")
          print("> Download the XLSX report from the Artifacts section below.")
          EOF
          else
            echo "Test report JSON not found." >> $GITHUB_STEP_SUMMARY
          fi

      # ── 13. Fail job if any tests failed ─────────────────────────────────
      - name: "Fail Job if Tests Failed"
        if: always()
        run: |
          if [ -f ".test-results/report.json" ]; then
            FAILED=$(python3 -c "
          import json
          with open('.test-results/report.json') as f:
              r = json.load(f)
          print(r.get('summary',{}).get('failed', 0))
          ")
            echo "Failed tests: $FAILED"
            if [ "$FAILED" -gt "0" ]; then
              echo "$FAILED test(s) failed. See report for details."
              exit 1
            fi
          fi
